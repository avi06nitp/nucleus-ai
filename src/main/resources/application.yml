server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:nucleus_ai}
    username: ${DB_USERNAME:nucleus}
    password: ${DB_PASSWORD:nucleus}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  websocket:
    message-size-limit: 65536
    send-buffer-size-limit: 524288

nucleus:
  config:
    file: ${NUCLEUS_CONFIG_FILE:agent-orchestrator.yaml}
