# Nucleus AI — Agent Orchestrator Configuration
# This file is the single source of truth for projects, plugins, and reaction rules.
# Place it in the working directory or set NUCLEUS_CONFIG env var to its path.

port: 3000

defaults:
  runtime: tmux            # docker | tmux
  agent: claude            # claude | openai
  workspace: worktree      # worktree | clone
  notifiers: [teams]       # teams | slack | desktop | webhook

projects:
  nucleus-ai:
    repo: avi06nitp/nucleus-ai
    path: /Users/avi/Desktop/nucleus-ai
    defaultBranch: main
    jiraProjectKey: NA
    agentType: claude
    runtime: docker
    sessionPrefix: na

  # Example: add more projects here
  # my-app:
  #   repo: owner/my-app
  #   path: ~/my-app
  #   defaultBranch: main
  #   jiraProjectKey: MYAPP
  #   agentType: claude
  #   runtime: docker
  #   sessionPrefix: app
  #
  # other-service:
  #   repo: owner/other-service
  #   path: ~/other-service
  #   defaultBranch: develop
  #   jiraProjectKey: SVC
  #   agentType: openai
  #   runtime: tmux
  #   sessionPrefix: svc

reactions:
  ci-failed:
    auto: true
    action: send-to-agent
    retries: 3
  changes-requested:
    auto: true
    action: send-to-agent
    escalateAfter: 30m
  approved-and-green:
    auto: false
    action: notify
