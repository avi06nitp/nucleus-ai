# Nucleus AI — Agent Orchestrator Configuration
# This file is the single source of truth for projects, plugins, and reaction rules.
# Place it in the working directory or set NUCLEUS_CONFIG env var to its path.

# Required environment variables:
#   GITHUB_WEBHOOK_SECRET — HMAC-SHA256 secret for GitHub webhook signature verification.
#                           Must be set or the application will refuse to start.
#                           Set via: export GITHUB_WEBHOOK_SECRET=<your-secret>

port: 3000

defaults:
  runtime: tmux            # docker | tmux
  agent: claude            # claude | openai
  workspace: worktree      # worktree | clone
  tracker: jira            # jira | github | linear  (per-project override takes precedence)
  notifiers: [teams]       # teams | slack | desktop | webhook

tracker:
  jira:
    baseUrl: https://company.atlassian.net
    email: ${JIRA_EMAIL:}
    apiToken: ${JIRA_API_TOKEN:}
  linear:
    apiKey: ${LINEAR_API_KEY:}
  github:
    token: ${GITHUB_TOKEN:}
    owner: ${GITHUB_OWNER:}
    repo: ${GITHUB_REPO:}

projects:
  nucleus-ai:
    repo: avi06nitp/nucleus-ai
    path: /Users/avi/Desktop/nucleus-ai
    defaultBranch: main
    tracker: github          # jira | github | linear
    agentType: claude
    runtime: docker
    sessionPrefix: na

  # Example: add more projects here
  # my-app:
  #   repo: owner/my-app
  #   path: ~/my-app
  #   defaultBranch: main
  #   tracker: github
  #   agentType: claude
  #   runtime: docker
  #   sessionPrefix: app
  #
  # payments-service:
  #   repo: owner/payments-service
  #   path: ~/payments-service
  #   defaultBranch: main
  #   tracker: jira
  #   agentType: claude
  #   runtime: tmux
  #   sessionPrefix: pay

reactions:
  ci-failed:
    auto: true
    action: send-to-agent
    retries: 3
  changes-requested:
    auto: true
    action: send-to-agent
    escalateAfter: 30m
  approved-and-green:
    auto: false
    action: notify
